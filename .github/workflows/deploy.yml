name: Deploy NHAI Attendance Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  AWS_REGION: ap-south-1
  BACKEND_DIR: backend

permissions:
  id-token: write
  contents: read

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint check
        run: npx eslint lambdas/ --ext .ts --max-warnings 0
        continue-on-error: true

  test:
    name: Run Tests
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json

      - run: npm ci

      - name: Unit tests
        run: npm test

  build:
    name: SAM Build
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: SAM Build
        run: sam build --use-container

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: ${{ env.BACKEND_DIR }}/.aws-sam/

  deploy-dev:
    name: Deploy to Development
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: development
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: ${{ env.BACKEND_DIR }}/.aws-sam/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Deploy (development)
        run: |
          sam deploy \
            --stack-name nhai-attendance-backend-dev \
            --config-env development \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "Environment=development JWTSecret=${{ secrets.JWT_SECRET_DEV }}"

      - name: Smoke test
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name nhai-attendance-backend-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          echo "Endpoint: $ENDPOINT"
          curl -sSf "$ENDPOINT/health" | head -c 200

  deploy-prod:
    name: Deploy to Production
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: ${{ env.BACKEND_DIR }}/.aws-sam/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Deploy (production)
        run: |
          sam deploy \
            --stack-name nhai-attendance-backend \
            --config-env production \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "Environment=production JWTSecret=${{ secrets.JWT_SECRET_PROD }}"

      - name: Smoke test
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name nhai-attendance-backend \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          echo "Endpoint: $ENDPOINT"
          curl -sSf "$ENDPOINT/health" | head -c 200
