openapi: 3.0.3
info:
  title: NHAI Attendance System API
  description: |
    REST API for the NHAI Offline Facial Recognition & Liveness Attendance System.
    Supports single and bulk attendance upload, employee management, and sync status queries.
    All attendance endpoints require JWT authentication.
  version: 1.0.0
  contact:
    name: NHAI Hackathon Team
  license:
    name: MIT

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: https://staging-api.example.com/v1
    description: Staging server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Cognito or custom auth
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    AttendanceRecord:
      type: object
      required:
        - userId
        - userName
        - timestamp
        - livenessPassed
        - confidence
      properties:
        id:
          type: string
          description: Client-generated unique ID for idempotency
          example: att_1717401600000_a1b2c3d4
        userId:
          type: string
          description: Registered employee/user ID
          example: emp_1717401600000_xyz789
        userName:
          type: string
          description: Display name of the user
          example: John Doe
        timestamp:
          type: integer
          description: Epoch timestamp in milliseconds
          example: 1717401600000
        latitude:
          type: number
          nullable: true
          description: GPS latitude
          example: 28.6139
        longitude:
          type: number
          nullable: true
          description: GPS longitude
          example: 77.209
        livenessPassed:
          type: boolean
          description: Whether liveness check passed
          example: true
        livenessChallenge:
          type: string
          description: Comma-separated challenges completed
          example: blink,smile
        confidence:
          type: number
          description: Recognition confidence percentage
          example: 95.2
        deviceId:
          type: string
          description: Unique device identifier
          example: device_abc123
        appVersion:
          type: string
          description: App version that created the record
          example: 1.0.0

    BulkSyncRequest:
      type: object
      required:
        - records
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecord'
          maxItems: 500
          description: Array of attendance records to sync
        deviceId:
          type: string
          description: Device identifier for all records
          example: device_abc123
        appVersion:
          type: string
          example: 1.0.0

    BulkSyncResponse:
      type: object
      properties:
        message:
          type: string
          example: Bulk sync completed
        synced:
          type: integer
          description: Number of new records synced
        duplicates:
          type: integer
          description: Number of duplicate records skipped
        failed:
          type: integer
          description: Number of records that failed to sync
        total:
          type: integer
          description: Total records in request
        acknowledgementIds:
          type: array
          items:
            type: string
          description: IDs for acknowledgement
        errors:
          type: array
          items:
            type: string
          description: Error messages for failed records

    EmployeeRegistration:
      type: object
      required:
        - name
        - designation
        - department
      properties:
        id:
          type: string
          description: Client-generated ID (optional)
        name:
          type: string
          description: Employee full name
          example: Rahul Sharma
        designation:
          type: string
          description: Job designation
          example: Highway Engineer
        department:
          type: string
          description: Department name
          example: Construction
        phone:
          type: string
          example: "+919876543210"
        email:
          type: string
          format: email
          example: rahul.sharma@nhai.gov.in

    EmployeeResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        designation:
          type: string
        department:
          type: string
        phone:
          type: string
        email:
          type: string
        faceRegistered:
          type: boolean
        registeredAt:
          type: integer
        active:
          type: boolean

    SyncStatusResponse:
      type: object
      properties:
        userId:
          type: string
        totalRecords:
          type: integer
        syncedRecords:
          type: integer
        pendingRecords:
          type: integer
        lastSyncTimestamp:
          type: integer
          nullable: true
        recentSyncs:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              timestamp:
                type: integer
              status:
                type: string
              confidence:
                type: number

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message

paths:
  /health:
    get:
      summary: Health check endpoint
      tags:
        - System
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                  version:
                    type: string
                  timestamp:
                    type: integer

  /attendance:
    post:
      summary: Record a single attendance entry
      tags:
        - Attendance
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRecord'
      responses:
        '201':
          description: Attendance recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: string
                  userId:
                    type: string
                  timestamp:
                    type: integer
                  status:
                    type: string
        '200':
          description: Duplicate record - already synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: string
                  status:
                    type: string
                  existingTimestamp:
                    type: integer
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized

  /attendance/bulk-sync:
    post:
      summary: Bulk upload offline attendance records
      tags:
        - Attendance
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSyncRequest'
      responses:
        '201':
          description: Bulk sync completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSyncResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /employee/register:
    post:
      summary: Register a new employee
      tags:
        - Employee
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeRegistration'
      responses:
        '201':
          description: Employee registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: string
                  name:
                    type: string
                  designation:
                    type: string
                  department:
                    type: string
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /employee/{id}:
    get:
      summary: Get employee details
      tags:
        - Employee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '404':
          description: Employee not found

    put:
      summary: Update employee details
      tags:
        - Employee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeRegistration'
      responses:
        '200':
          description: Employee updated
        '404':
          description: Employee not found

    delete:
      summary: Deactivate an employee
      tags:
        - Employee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee deactivated
        '404':
          description: Employee not found

  /sync-status/{userId}:
    get:
      summary: Get sync status for a user
      tags:
        - Sync
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'
        '401':
          description: Unauthorized
